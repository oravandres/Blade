---
- name: Stop Ollama
  ansible.builtin.command: pkill -f /Applications/Ollama.app
  register: blade_ollama_stop_result
  changed_when: blade_ollama_stop_result.rc == 0
  failed_when: blade_ollama_stop_result.rc not in [0, 1]

- name: Start Ollama
  ansible.builtin.command: open -a Ollama
  changed_when: true
