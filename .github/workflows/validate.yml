name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ansible:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible tooling
        run: python -m pip install --upgrade pip ansible ansible-lint

      - name: Run playbook syntax check
        run: ansible-playbook --syntax-check playbooks/bootstrap-macos.yml

      - name: Run ansible-lint
        run: ansible-lint
